name: Release

# Builds the Windows executable and attaches it to a GitHub Release when you
# push a version tag, e.g.  git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install Pillow pyinstaller

      - name: Build the executable
        run: pyinstaller --noconfirm --clean OPEN-IPTV.spec

      - name: Attach exe to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OPEN-IPTV.exe
          generate_release_notes: true
